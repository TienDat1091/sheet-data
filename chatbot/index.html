<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../script_report/theme.js"></script>
</head>
<body>
    <div class="app-layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Lịch sử Chat
                </div>
                <div style="display:flex; gap: 4px;">
                    <button class="btn-sidebar-action" id="bulk-delete-btn" title="Xóa toàn bộ lịch sử">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                    <button class="btn-new-chat" id="new-chat-btn" title="Tạo chat mới">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </div>
            <div class="history-list" id="history-list">
                <!-- Được điền bằng JS -->
            </div>
            <div class="knowledge-panel">
                <div class="knowledge-title">
                    <span>Tài liệu AI</span>
                    <button class="knowledge-clear-btn" id="knowledge-clear-btn" title="Xóa toàn bộ tài liệu AI">×</button>
                </div>
                <label class="knowledge-upload-btn" title="Nạp tài liệu để AI tra cứu">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Nạp tài liệu
                    <input type="file" id="knowledge-upload-input" accept="*/*" multiple hidden>
                </label>
                <div class="knowledge-list" id="knowledge-list"></div>
            </div>
            <div class="sidebar-footer">
                <div class="auto-delete-setting">
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Tự động xóa lịch sử:</span>
                    <select id="auto-delete-select">
                        <option value="0">Không bao giờ</option>
                        <option value="1">Sau 1 ngày</option>
                        <option value="7">Sau 7 ngày</option>
                        <option value="30">Sau 30 ngày</option>
                    </select>
                </div>
                <button class="footer-btn" id="backup-btn" title="Backup toàn bộ lịch sử">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Backup lịch sử
                </button>
                <label class="footer-btn" title="Restore từ file backup">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Restore
                    <input type="file" id="restore-input" accept=".json" hidden>
                </label>
            </div>
        </aside>

        <!-- ===== MAIN CHAT ===== -->
        <div class="chat-main">
            <div class="chat-header">
                <button class="sidebar-toggle" id="sidebar-toggle" title="Mở/đóng lịch sử">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="header-info">
                    <svg class="chatbot-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
                        <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5z"/>
                    </svg>
                    <div>
                        <span class="logo-text">Chatbot AI</span>
                        <span class="session-name" id="session-name">Chat mới</span>
                    </div>
                    <div class="model-switcher">
                        <select id="model-select" class="model-select" title="Chọn phiên bản Gemini">
                            <option value="gemini-3-flash-preview" selected>Gemini 3.0 Flash (Mới nhất)</option>
                        </select>
                    </div>
                </div>
                <div class="header-actions">
                    <a class="header-icon-btn" href="../index.html" title="Quay về trang chính" aria-label="Quay về trang chính">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5"/>
                            <path d="M12 19l-7-7 7-7"/>
                        </svg>
                    </a>
                    <button class="theme-toggle-btn" title="Đổi màu Sáng/Tối">🌙</button>
                </div>
            </div>

            <div class="chat-body" id="chat-body">
                <div class="message bot-message">
                    <svg class="bot-avatar" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 1024 1024">
                        <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6 41.8-.8h117.4l43.6-.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9zM351.7 448.2c0-29.5 23.9-53.5 53.5-53.5s53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5-53.5-23.9-53.5-53.5zm157.9 267.1c-67.8 0-123.8-47.5-132.3-109h264.6c-8.6 61.5-64.5 109-132.3 109zm110-213.7c-29.5 0-53.5-23.9-53.5-53.5s23.9-53.5 53.5-53.5 53.5 23.9 53.5 53.5-23.9 53.5-53.5 53.5z"/>
                    </svg>
                    <div class="message-text">Xin chào 👋<br>Tôi có thể giúp gì cho bạn hôm nay?</div>
                </div>
            </div>

            <div class="chat-footer">
                <!-- File/Image Preview Bar -->
                <div class="image-preview-bar" id="image-preview-bar" style="display:none;">
                    <div class="attachment-preview-list" id="attachment-preview-list"></div>
                    <button id="preview-cancel" class="preview-clear-all" title="Xóa tất cả file">×</button>
                </div>

                <form class="chat-form" id="chat-form">
                    <textarea class="message-input" id="message-input" placeholder="Nhập tin nhắn... (Paste ảnh bằng Ctrl+V)" required></textarea>
                    <div class="chat-controls">
                        <label class="attach-btn" title="Đính kèm file hoặc ảnh">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                            <input type="file" id="file-input" accept="*/*" multiple hidden>
                        </label>
                        <button type="submit" id="send-message" title="Gửi">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                        <button type="button" id="cancel-response" class="chat-action-btn cancel-response" title="Hủy trả lời" style="display:none;">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                        <button type="button" id="retry-response" class="chat-action-btn retry-response" title="Load lại câu hỏi" style="display:none;">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
